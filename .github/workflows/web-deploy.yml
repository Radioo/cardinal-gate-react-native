name: Web Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - master

concurrency:
  group: web-deploy
  cancel-in-progress: false

jobs:
  web-deploy:
    name: EAS Web Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: npm

      - name: Cache Expo CLI
        uses: actions/cache@v4
        with:
          path: ~/.expo
          key: expo-cli-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: expo-cli-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build web app
        run: NODE_ENV=dev npx expo export --platform web

      - name: Deploy web app
        run: eas deploy --prod
