name: Android Build

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-build:
    name: Local Build Android
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: npm

      - name: Cache Expo CLI
        uses: actions/cache@v4
        with:
          path: ~/.expo
          key: expo-cli-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: expo-cli-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build android app
        run: |
          NODE_ENV=dev eas build --local \
          --non-interactive \
          --output=./app-build.apk \
          --platform=android

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: App Android
          path: app-build.apk
